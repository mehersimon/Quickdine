<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code – QuickDine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
  {% include "partials/sidebar.html" %}
  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">QR Code</h1>
        <p class="page-sub">Your permanent menu QR code</p>
      </div>
    </div>

    <div class="qr-container">
      <div class="qr-card" id="qr-printable">
        <div id="qr-logo-wrap" style="display:none">
          <img id="qr-logo" class="qr-logo" src="" alt="Logo">
        </div>
        <h2 class="qr-rest-name" id="qr-rest-name">Loading…</h2>
        <img id="qr-img" class="qr-image" src="" alt="QR Code">
        <p class="qr-caption">Scan to browse our menu &amp; order</p>
        <div class="qr-url" id="qr-url"></div>
      </div>

      <div class="qr-actions">
        <a id="qr-download" class="btn btn-primary" download>⬇ Download PNG</a>
        <button class="btn btn-ghost" onclick="window.print()">🖨 Print</button>
        <button class="btn btn-ghost" onclick="copyUrl()">🔗 Copy Link</button>
      </div>

      <div class="qr-table-hint">
        <p>💡 <strong>Table-specific links:</strong> Append <code>?table=1</code>, <code>?table=2</code> … to the menu URL for specific tables.</p>
        <p id="qr-example-url" style="font-size:.85rem;color:var(--muted);margin-top:.5rem"></p>
      </div>
    </div>
  </main>

  <script src="/static/js/auth.js"></script>
  <script src="/static/js/dashboard.js"></script>
  <script>
    requireAuth();
    async function loadQR() {
      const data = await api('/api/dashboard/qr');
      document.getElementById('qr-rest-name').textContent = data.restaurant_name;
      const qrUrl = `/api/qr/generate/${data.restaurant_id}`;
      const img = document.getElementById('qr-img');
      img.src = qrUrl;
      document.getElementById('qr-download').href = qrUrl;
      document.getElementById('qr-url').textContent = data.menu_url;
      document.getElementById('qr-example-url').textContent = `e.g. ${data.menu_url}?table=3`;
      if(data.logo_url) {
        document.getElementById('qr-logo').src = data.logo_url;
        document.getElementById('qr-logo-wrap').style.display = 'block';
      }
    }
    function copyUrl() {
      const url = document.getElementById('qr-url').textContent;
      navigator.clipboard.writeText(url).then(() => alert('Link copied!'));
    }
    loadQR();
  </script>
</body>
</html>
