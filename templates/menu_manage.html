<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu – QuickDine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
  {% include "partials/sidebar.html" %}
  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Menu Management</h1>
        <p class="page-sub">Add, edit, and manage your food items</p>
      </div>
      <button class="btn btn-primary" onclick="openModal()">+ Add Item</button>
    </div>

    <!-- Items grid -->
    <div class="menu-grid" id="menu-grid">
      <div class="loading-spinner">Loading menu…</div>
    </div>
  </main>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="modal" style="display:none">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modal-title">Add Food Item</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="form-error" class="error-box" style="display:none"></div>
      <div class="form-group">
        <label>Food Name *</label>
        <input type="text" id="f-name" placeholder="e.g. Butter Chicken">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <input type="text" id="f-category" placeholder="e.g. Main Course">
        </div>
        <div class="form-group">
          <label>Price (₹) *</label>
          <input type="number" id="f-price" placeholder="0.00" min="0" step="0.01">
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="f-desc" placeholder="Short description…" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>Food Image</label>
        <input type="file" id="f-image" accept="image/*">
        <img id="f-preview" style="display:none;margin-top:.5rem;height:80px;border-radius:.75rem;object-fit:cover">
      </div>
      <div class="form-group" id="avail-group" style="display:none">
        <label class="toggle-label">
          <input type="checkbox" id="f-avail" checked>
          <span>Available to customers</span>
        </label>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="save-btn" onclick="saveItem()">Save Item</button>
      </div>
    </div>
  </div>

  <script src="/static/js/auth.js"></script>
  <script src="/static/js/dashboard.js"></script>
  <script src="/static/js/menu.js"></script>
  <script>
    requireAuth();
    loadMenuItems();
    document.getElementById('f-image').addEventListener('change', function() {
      const preview = document.getElementById('f-preview');
      if(this.files[0]) {
        preview.src = URL.createObjectURL(this.files[0]);
        preview.style.display = 'block';
      }
    });
  </script>
</body>
</html>
